<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#831843"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bg)"/>

  <!-- Controller body -->
  <rect x="18" y="42" width="84" height="46" rx="14" fill="url(#body)"/>

  <!-- Left grip -->
  <ellipse cx="30" cy="82" rx="14" ry="10" fill="url(#body)"/>

  <!-- Right grip -->
  <ellipse cx="90" cy="82" rx="14" ry="10" fill="url(#body)"/>

  <!-- D-pad vertical -->
  <rect x="33" y="52" width="8" height="20" rx="2" fill="#a78bfa"/>

  <!-- D-pad horizontal -->
  <rect x="29" y="56" width="16" height="8" rx="2" fill="#a78bfa"/>

  <!-- Buttons (ABXY) -->
  <circle cx="80" cy="55" r="4" fill="#f43f5e"/>
  <circle cx="88" cy="62" r="4" fill="#facc15"/>
  <circle cx="72" cy="62" r="4" fill="#22d3ee"/>
  <circle cx="80" cy="69" r="4" fill="#4ade80"/>

  <!-- Center button -->
  <circle cx="60" cy="62" r="5" fill="#7c3aed" stroke="#a78bfa" stroke-width="1.5"/>

  <!-- L bumper -->
  <rect x="22" y="38" width="22" height="8" rx="4" fill="#6d28d9"/>

  <!-- R bumper -->
  <rect x="76" y="38" width="22" height="8" rx="4" fill="#6d28d9"/>

  <!-- Shine -->
  <ellipse cx="60" cy="20" rx="30" ry="10" fill="white" opacity="0.08"/>
</svg>
